name: HF Download Stats

on:
  schedule:
    - cron: '7 9 * * *'  # Daily at 9:07 AM UTC
  workflow_dispatch: {}   # Manual trigger

permissions:
  contents: write

jobs:
  track-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: pip install huggingface_hub

      - name: Run download stats
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python hf_download_stats.py --log --update-hf-profile --author ermiaazarkhalili

      - name: Commit logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily HF download stats $(date -u +%Y-%m-%d)"
            git push
          fi
